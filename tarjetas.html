<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Float vs Flexbox</title>
  <link rel="stylesheet" href="tarjeta_float.css">
  <link rel="stylesheet" href="tarjeta_flex.css">
  <style>
    body {
      padding: 40px;
      font-family: Arial, sans-serif;
    }
    .contenedor {
      display: flex;
      justify-content: center;
      gap: 60px;
    }
    h3 {
      text-align: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div>
      <h3>Con Float</h3>
      <div class="card-float">
        <div class="imagen">
          <img src="https://i.pinimg.com/originals/20/9b/95/209b9588f39e0fe95ad9952bcf8385c5.jpg" alt="Zapatos Deportivos">
        </div>
        <div class="info">
          <h2>Zapatos Futuristas</h2>
          <p class="descripcion">Cómodos y ligeros, ideales para el estilo de vida moderna.</p>
          <p class="precio">$120.00</p>
        </div>
        <button class="btn">Comprar</button>
      </div>
    </div>
    <div>
      <h3>Con Flexbox</h3>
      <div class="card-flex">
        <div class="imagen">
          <img src="https://di2ponv0v5otw.cloudfront.net/posts/2023/12/10/657686b804166d662da7352f/m_657686c202760b2613498dc5.jpg" alt="Zapatos Deportivos">
        </div>
        <div class="info">
          <h2>Zapatos Deportivos</h2>
          <p class="descripcion">Cómodos, deportivos y con gran estilo.</p>
          <p class="precio">$90.00</p>
        </div>
        <button class="btn">Comprar</button>
      </div>
    </div>
  </div>
</body>
</html>
